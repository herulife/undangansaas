server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 64M;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /templates/ {
    try_files $uri $uri/ =404;
    add_header Cache-Control "public, max-age=300";
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }
}
