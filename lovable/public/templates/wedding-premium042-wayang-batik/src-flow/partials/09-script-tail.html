<script>
    var imagesGalleries,ImageSwipeitems;
    var setImageSwipe = function(){
        imagesGalleries = document.querySelectorAll(".gallery,#nav-cerita ul img,#nav-cerita .story img");
        ImageSwipeitems = [];
        imagesGalleries.forEach(function(e,i){
            if(e.tagName === "IMG"){
                e.addEventListener("click",function(el){
                    openPhotoSwipe(i);
                });
                var gap = 712 / e.clientWidth;
                var newWidht = 712;
                var newHeight = e.clientHeight * gap;
                var srcImg = e.getAttribute("src");
                ImageSwipeitems.push(
                    {
                        src: srcImg,
                        w: newWidht,
                        h: newHeight
                    }
                );
            }else{
                try{
                    var elementStyle = e.currentStyle || window.getComputedStyle(e, false);
                    var srcImg = elementStyle.backgroundImage.slice(4, -1).replace(/"/g, "");
                    if(srcImg != ""){
                        e.addEventListener("click",function(el){
                            openPhotoSwipe(i);
                        });
                        var gap = 712 / e.clientWidth;
                        var newWidht = 712;
                        var newHeight = e.clientHeight * gap;
                        ImageSwipeitems.push(
                            {
                                src: srcImg,
                                w: newWidht,
                                h: newHeight
                            }
                        );
                    }
                }catch(e){}
            }
        })
    }
    var openPhotoSwipe = function(idx){
        setImageSwipe();
        var pswpElement = document.querySelector('.pswp');
        var options = {
            index:idx,
            history: false,
          	focus: false,
    
            showAnimationDuration: 0,
            hideAnimationDuration: 0,
            shareEl : false,
        };
        var gallery = new PhotoSwipe( pswpElement, PhotoSwipeUI_Default, ImageSwipeitems, options);
        gallery.init();
        gallery.listen('destroy', () => {
          setTimeout(function(){
              document.querySelector(".pswp").className="pswp";
          }, 500);
          console.log("closedd");
        });
    }
    $(document).ready(function(e){
        setImageSwipe();
    });
</script>

<script id="local-template-controls">
(function(){
  var localReadTimer = null;
  var scrollRange = window.rangeAutoScroll || 275;
  var scrollSpeed = window.speedAutoScroll || 1250;
  var scrollInterval = window.intervalAutoScroll || 2000;

  function currentAudio() {
    if (!window.audio) {
      window.audio = new Audio('./assets/audio/islamic-wedding-backsound.m4a');
      window.audio.loop = true;
    }
    window.audio.loop = true;
    return window.audio;
  }

  function setSoundState(isPlaying) {
    var button = document.querySelector('.backsound');
    if (!button) return;
    button.classList.toggle('play', isPlaying);
    button.classList.toggle('pause', !isPlaying);
  }

  function playSound() {
    var sound = currentAudio();
    var playPromise = sound.play();
    if (playPromise && typeof playPromise.catch === 'function') {
      playPromise.catch(function(){ setSoundState(false); });
    }
    setSoundState(true);
  }

  function pauseSound() {
    currentAudio().pause();
    setSoundState(false);
  }

  function stopReadMode(button) {
    clearInterval(localReadTimer);
    if (window.interValScrolling) clearInterval(window.interValScrolling);
    localReadTimer = null;
    window.interValScrolling = null;
    if (window.jQuery) jQuery('html, body').stop(true);
    if (button) {
      button.classList.remove('active');
      var spinner = button.querySelector('svg');
      if (spinner) spinner.classList.remove('animationSpin');
    }
    document.body.style.overflow = '';
  }

  function startReadMode(button) {
    stopReadMode(button);
    button.classList.add('active');
    var spinner = button.querySelector('svg');
    if (spinner) spinner.classList.add('animationSpin');
    var step = function(){
      var maxScroll = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight) - window.innerHeight;
      if (window.scrollY >= maxScroll - 8) {
        stopReadMode(button);
        return;
      }
      document.body.style.overflow = 'hidden';
      if (window.jQuery) {
        jQuery('html, body').stop(true).animate({ scrollTop: Math.min(window.scrollY + scrollRange, maxScroll) }, scrollSpeed, window.easingAutoScroll || 'easeInOutQuad');
      } else {
        window.scrollTo({ top: Math.min(window.scrollY + scrollRange, maxScroll), behavior: 'smooth' });
      }
    };
    step();
    localReadTimer = setInterval(step, scrollInterval);
  }

  document.addEventListener('click', function(event){
    var openInvitationButton = event.target.closest('button.open-invitation');
    if (openInvitationButton) {
      playSound();
      return;
    }

    var soundButton = event.target.closest('.backsound');
    if (soundButton) {
      event.preventDefault();
      event.stopImmediatePropagation();
      if (soundButton.classList.contains('play')) pauseSound();
      else playSound();
      return;
    }

    var readButton = event.target.closest('#button-mode-read');
    if (readButton) {
      event.preventDefault();
      event.stopImmediatePropagation();
      if (readButton.classList.contains('active')) stopReadMode(readButton);
      else startReadMode(readButton);
      return;
    }

    var topButton = event.target.closest('#button-to-top');
    if (topButton) {
      event.preventDefault();
      event.stopImmediatePropagation();
      stopReadMode(document.querySelector('#button-mode-read'));
      if (window.jQuery) jQuery('html, body').stop(true).animate({ scrollTop: 0 }, 900);
      else window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  }, true);

  document.addEventListener('visibilitychange', function(){
    if (document.hidden) currentAudio().pause();
    else if (document.querySelector('.backsound.play')) playSound();
  });

  function bindInitialState() {
    setSoundState(true);
    var openButton = document.querySelector('button.open-invitation');
    if (openButton) {
      openButton.addEventListener('click', function(){
        playSound();
      });
    }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', bindInitialState);
  else bindInitialState();
})();
</script>
